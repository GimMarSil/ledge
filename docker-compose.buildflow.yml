# Docker Compose para deploy como módulo BuildFlow
# Usar no servidor BuildFlow (77.42.26.248)
# Includes Traefik labels + traefik-public network for HTTPS routing

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: despesas-fiscal-app:latest
    container_name: buildflow_despesas_fiscal
    environment:
      - NODE_ENV=production
      - PORT=7331
      - SELF_HOSTED_MODE=false
      - UPLOAD_PATH=/app/data/uploads
      - BUILDFLOW_MODULE=true
      - DATABASE_URL=postgresql://admin:jO0rFwGR2ykmAJpOImll5Vnts7RlB95j@postgres:5432/client_despesas_fiscal
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - buildflow_network
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.despesas.rule=Host(`despesas.buildflow.pt`)"
      - "traefik.http.routers.despesas.entrypoints=websecure"
      - "traefik.http.routers.despesas.tls.certresolver=letsencrypt"
      - "traefik.http.services.despesas.loadbalancer.server.port=7331"
    logging:
      driver: "json-file"
      options:
        max-size: "100M"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    container_name: despesas_fiscal_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=jO0rFwGR2ykmAJpOImll5Vnts7RlB95j
      - POSTGRES_DB=client_despesas_fiscal
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - buildflow_network
    logging:
      driver: "json-file"
      options:
        max-size: "50M"
        max-file: "3"

networks:
  buildflow_network:
    driver: bridge
  traefik-public:
    external: true
